<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>Paws of Fury</title>
<style>
  :root{
    --bg:#0a0a0f; --ink:#f6f1e7; --gold:#ffcf4a; --red:#ff3b3b; --blue:#4ad0ff;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%;background:var(--bg);color:var(--ink);
    font-family:'Trebuchet MS','Segoe UI',system-ui,sans-serif;overflow:hidden}
  #wrap{position:fixed;inset:0;display:flex;align-items:center;justify-content:center}
  /* Canvas scales to fit the viewport while preserving 16:9 */
  #game{image-rendering:auto;background:#000;box-shadow:0 0 60px rgba(0,0,0,.8);
    max-width:100%;max-height:100%;width:auto;height:auto;aspect-ratio:16/9}
  #hint{position:fixed;left:50%;bottom:8px;transform:translateX(-50%);
    font-size:12px;opacity:.45;letter-spacing:.5px;pointer-events:none;text-align:center;width:100%}
  @media (max-width:780px){#hint{display:none}}

  /* ---------------- mobile on-screen controls ---------------- */
  html,body{touch-action:none;overscroll-behavior:none}
  .touchctl{display:none;position:fixed;z-index:20;
    user-select:none;-webkit-user-select:none;-webkit-touch-callout:none}
  body.touch .touchctl{display:block}
  body.touch #hint{display:none}
  .pad,.acts{width:46vmin;height:46vmin;bottom:3.5vmin}
  .pad{left:2.5vmin}
  .acts{right:2.5vmin}
  .menu-btn{top:2vmin;right:2vmin}
  .ctl{position:absolute;margin:0;padding:0;appearance:none;-webkit-appearance:none;
    display:flex;align-items:center;justify-content:center;border-radius:50%;
    color:#fff;font-family:'Trebuchet MS',sans-serif;font-weight:700;line-height:1;
    background:rgba(18,18,26,0.40);border:0.5vmin solid rgba(255,255,255,0.32);
    box-shadow:0 0.4vmin 1vmin rgba(0,0,0,0.45);
    -webkit-tap-highlight-color:transparent;outline:none;touch-action:none;cursor:pointer;
    transition:transform .04s ease, background .04s ease}
  .ctl.on{transform:scale(.9);background:rgba(255,255,255,0.26)}
  .dbtn{width:15vmin;height:15vmin;font-size:6vmin}
  .abtn{width:15vmin;height:15vmin;font-size:5.4vmin}
  .d-up{left:15.5vmin;top:0}   .d-down{left:15.5vmin;bottom:0}
  .d-left{left:0;top:15.5vmin} .d-right{right:0;top:15.5vmin}
  .a-up{left:15.5vmin;top:0}   .a-down{left:15.5vmin;bottom:0}
  .a-left{left:0;top:15.5vmin} .a-right{right:0;top:15.5vmin}
  .a-special{border-color:#4ad0ff;color:#cdefff;font-size:4.4vmin}
  .a-light{border-color:#ffcf4a;color:#ffe9b0}
  .a-heavy{border-color:#ff8a3c;color:#ffd2b0}
  .a-block{border-color:#9fb2cc;color:#dfe8f4;font-size:3.4vmin}
  .mbtn{width:10vmin;height:10vmin;font-size:3.4vmin}
  #rotate-hint{display:none;position:fixed;inset:0;z-index:40;
    background:rgba(8,6,10,0.93);color:#ffcf4a;text-align:center;
    align-items:center;justify-content:center;font-family:'Trebuchet MS',sans-serif}
  #rotate-hint>div{font-size:6vw;font-weight:700;line-height:1.7}
  #rotate-hint small{font-size:3.2vw;color:#bbb;font-weight:400}
  @media (orientation:portrait){ body.touch:not(.norotate) #rotate-hint{display:flex} }
</style>
</head>
<body>
  <div id="wrap"><canvas id="game" width="960" height="540"></canvas></div>
  <div id="hint">P1: A/D move · W jump · S crouch · F light · G heavy · H special · hold away = block &nbsp;|&nbsp; P2: ◀▶ ▲ ▼ · , light · . heavy · / special &nbsp;|&nbsp; M mute · Esc menu</div>

  <!-- mobile on-screen controls (shown only on touch devices) -->
  <div class="touchctl pad">
    <button class="ctl dbtn d-up"    data-k="w" aria-label="Jump">▲</button>
    <button class="ctl dbtn d-left"  data-k="a" aria-label="Left">◀</button>
    <button class="ctl dbtn d-right" data-k="d" aria-label="Right">▶</button>
    <button class="ctl dbtn d-down"  data-k="s" aria-label="Crouch">▼</button>
  </div>
  <div class="touchctl acts">
    <button class="ctl abtn a-special a-up"  data-k="h"     aria-label="Special">SP</button>
    <button class="ctl abtn a-light a-left"  data-k="f"     aria-label="Light">L</button>
    <button class="ctl abtn a-heavy a-right" data-k="g"     aria-label="Heavy">H</button>
    <button class="ctl abtn a-block a-down"  data-k="block" aria-label="Block">BLK</button>
  </div>
  <div class="touchctl menu-btn">
    <button class="ctl mbtn" data-k="escape" aria-label="Menu">❚❚</button>
  </div>
  <div id="rotate-hint"><div>↻<br>Rotate to landscape<br><small>tap to play anyway</small></div></div>
<script>
"use strict";
/* =========================================================================
   PAWS OF FURY — a Mortal-Kombat-style dog brawler (single-file canvas game)
   Roster: Elvis (Husky) · Dixie (Blue Heeler) · Lucy (Doxie×Chihuahua) ·
           Houston (Black German Shepherd) · Teenie (Golden Doodle)
   ========================================================================= */

const cv = document.getElementById("game");
const ctx = cv.getContext("2d");
const W = cv.width, H = cv.height;
const GROUND = 472;                 // feet line
const GRAVITY = 0.9;
const ARENA_PAD = 40;               // wall margins

/* ------------------------------------------------------- draw utilities -- */
function clamp(v,a,b){ return v<a?a:v>b?b:v; }
function _hx(h){
  if(h[0]!=='#'){ const m=h.match(/[\d.]+/g); if(m) return [+m[0],+m[1],+m[2]]; }  // accept rgb()/rgba()
  h=h.replace('#',''); if(h.length===3) h=h.split('').map(c=>c+c).join('');
  return [parseInt(h.slice(0,2),16),parseInt(h.slice(2,4),16),parseInt(h.slice(4,6),16)]; }
// amt>0 lightens toward white, amt<0 darkens toward black
function mix(c,amt){ const a=_hx(c),t=amt>0?255:0,k=Math.abs(amt);
  return `rgb(${a.map(v=>Math.round(v+(t-v)*k)).join(',')})`; }
function rgba(c,al){ const a=_hx(c); return `rgba(${a[0]},${a[1]},${a[2]},${al})`; }
function roundRect(x,y,w,h,r){ r=Math.min(r,w/2,h/2); ctx.beginPath();
  ctx.moveTo(x+r,y); ctx.arcTo(x+w,y,x+w,y+h,r); ctx.arcTo(x+w,y+h,x,y+h,r);
  ctx.arcTo(x,y+h,x,y,r); ctx.arcTo(x,y,x+w,y,r); ctx.closePath(); }
function vGrad(yTop,yBot,top,bot){ const g=ctx.createLinearGradient(0,yTop,0,yBot);
  g.addColorStop(0,top); g.addColorStop(1,bot); return g; }

/* ---------------------------------------------------------------- roster -- */
// Stats are 1..10. They map to derived gameplay values in deriveStats().
const FIGHTERS = [
  {
    id:"elvis", name:"ELVIS", breed:"Siberian Husky",
    blurb:"All-round athlete. Endurance, speed and a stubborn streak.",
    stats:{strength:7, speed:8, agility:7, cleverness:6, aggressiveness:5},
    colors:{coat:"#f4f4f6", shade:"#c9ccd6", belly:"#ffffff", mask:"#7b8089",
            ear:"#cfd2da", eye:"#54b6e8", nose:"#222"},
    body:{len:78, height:92, legLen:34, ear:"prick", tail:"curl", fluff:0.15, snout:14},
    special:{name:"SLED RUSH", kind:"dash", dmg:22, color:"#9fe0ff"},
    stage:"snow"
  },
  {
    id:"dixie", name:"DIXIE", breed:"Blue Heeler",
    blurb:"Cattle-dog brains and footwork. Nips and never sits still.",
    stats:{strength:5, speed:8, agility:9, cleverness:9, aggressiveness:6},
    colors:{coat:"#8b97a8", shade:"#5c6675", belly:"#cfd6df", mask:"#3c434f",
            ear:"#6b7280", eye:"#caa24a", nose:"#222"},
    body:{len:74, height:86, legLen:32, ear:"prick", tail:"med", fluff:0.18, snout:13},
    special:{name:"HEEL NIP", kind:"flurry", dmg:6, hits:4, color:"#bcd0e6"},
    stage:"yard"
  },
  {
    id:"lucy", name:"LUCY", breed:"Doxie × Chihuahua",
    blurb:"Tiny. Long. OFF-THE-CHARTS aggressive. Berserk rage builds fast.",
    stats:{strength:3, speed:7, agility:6, cleverness:5, aggressiveness:10},
    colors:{coat:"#a05a2c", shade:"#7a3f1c", belly:"#d89a63", mask:"#5a2f15",
            ear:"#8a4a22", eye:"#3a1f0e", nose:"#1a1a1a"},
    body:{len:104, height:58, legLen:18, ear:"bat", tail:"med", fluff:0.05, snout:18},
    special:{name:"RAGE SPIN", kind:"flurry", dmg:5, hits:6, color:"#ff5a3c"},
    stage:"kitchen"
  },
  {
    id:"houston", name:"HOUSTON", breed:"Black German Shepherd",
    blurb:"Disciplined guard dog. Hits like a freight train, tanks punishment.",
    stats:{strength:9, speed:6, agility:6, cleverness:8, aggressiveness:7},
    colors:{coat:"#26282e", shade:"#15161a", belly:"#3a3d45", mask:"#0c0d10",
            ear:"#1c1d22", eye:"#d8a13a", nose:"#0a0a0a"},
    body:{len:86, height:98, legLen:38, ear:"prick", tail:"bush", fluff:0.22, snout:16},
    special:{name:"GUARD SLAM", kind:"slam", dmg:26, color:"#ffcf4a"},
    stage:"garage"
  },
  {
    id:"teenie", name:"TEENIE", breed:"Golden Doodle",
    blurb:"Fluffy genius. Lobs fur-puffs from range and never panics.",
    stats:{strength:6, speed:6, agility:7, cleverness:9, aggressiveness:4},
    colors:{coat:"#e6b878", shade:"#caa05e", belly:"#f3d7a6", mask:"#caa05e",
            ear:"#d2a766", eye:"#3a2a16", nose:"#2a1d12"},
    body:{len:80, height:92, legLen:34, ear:"floppy", tail:"bush", fluff:0.9, snout:13},
    special:{name:"FUR PUFF", kind:"projectile", dmg:14, color:"#fff0cf"},
    stage:"living"
  },
];
const byId = Object.fromEntries(FIGHTERS.map(f=>[f.id,f]));

// derive concrete gameplay numbers from the 1..10 stats
function deriveStats(s){
  return {
    walk:      2.0 + s.speed*0.34,
    dash:      (2.0 + s.speed*0.34)*1.85,
    jump:      12 + s.agility*0.95,
    dmgMult:   0.72 + s.strength*0.06,
    takenMult: 1.12 - s.strength*0.028,        // tankiness from strength
    maxHp:     92 + s.strength*2,
    meterGain: 0.7 + s.cleverness*0.06,
    // CPU brain
    aiReact:   Math.max(5, 22 - s.cleverness*1.9),  // frames of reaction lag
    aiAtk:     0.16 + s.aggressiveness*0.055,        // attack desire
    aiBlock:   0.06 + s.cleverness*0.075,            // block reaction
    aiApproach:0.4 + s.aggressiveness*0.05,
    rage:      s.aggressiveness>=10,                  // Lucy berserk
  };
}

/* --------------------------------------------------------------- moves ---- */
// Generic normals shared by everyone (scaled by dmgMult). Specials are custom.
const MOVES = {
  light: {name:"light", startup:4, active:3, recovery:9, dmg:6, range:64, reach:30,
          kb:3.2, hitstun:14, meter:7, height:"mid"},
  heavy: {name:"heavy", startup:9, active:4, recovery:19, dmg:13, range:78, reach:42,
          kb:8.5, hitstun:24, meter:11, height:"mid"},
  // crouch heavy = low sweep
  sweep: {name:"sweep", startup:7, active:4, recovery:18, dmg:10, range:74, reach:40,
          kb:6, hitstun:22, meter:9, height:"low", knockdown:true},
};

/* --------------------------------------------------------------- audio ---- */
const Audio = (()=>{
  let ac=null, master=null, muted=false, musicNodes=[];
  function ensure(){
    if(ac) return;
    try{
      ac = new (window.AudioContext||window.webkitAudioContext)();
      master = ac.createGain(); master.gain.value = muted?0:0.5; master.connect(ac.destination);
    }catch(e){ ac=null; }
  }
  function tone(freq, dur, type, vol, slideTo){
    if(!ac) return;
    const o=ac.createOscillator(), g=ac.createGain();
    o.type=type||"square"; o.frequency.value=freq;
    if(slideTo) o.frequency.exponentialRampToValueAtTime(slideTo, ac.currentTime+dur);
    g.gain.value=0; g.gain.linearRampToValueAtTime(vol||0.2, ac.currentTime+0.01);
    g.gain.exponentialRampToValueAtTime(0.0001, ac.currentTime+dur);
    o.connect(g); g.connect(master); o.start(); o.stop(ac.currentTime+dur+0.02);
  }
  function noise(dur, vol){
    if(!ac) return;
    const n=ac.createBufferSource(), buf=ac.createBuffer(1, ac.sampleRate*dur, ac.sampleRate);
    const d=buf.getChannelData(0);
    for(let i=0;i<d.length;i++) d[i]=(Math.random()*2-1)*(1-i/d.length);
    n.buffer=buf; const g=ac.createGain(); g.gain.value=vol||0.25;
    n.connect(g); g.connect(master); n.start();
  }
  const sfx = {
    hit(){ ensure(); noise(0.12,0.3); tone(180,0.12,"square",0.25,90); },
    heavy(){ ensure(); noise(0.18,0.4); tone(120,0.2,"sawtooth",0.3,60); },
    block(){ ensure(); tone(900,0.06,"square",0.15,700); noise(0.05,0.1); },
    bark(){ ensure(); tone(420,0.09,"square",0.22,260); setTimeout(()=>tone(360,0.08,"square",0.18,220),70); },
    growl(){ ensure(); tone(90,0.3,"sawtooth",0.25,60); },
    jump(){ ensure(); tone(300,0.12,"sine",0.18,560); },
    ko(){ ensure(); tone(160,0.5,"sawtooth",0.35,40); noise(0.5,0.3); },
    select(){ ensure(); tone(660,0.07,"square",0.2,880); },
    move(){ ensure(); tone(520,0.05,"square",0.12,640); },
    whoosh(){ ensure(); noise(0.1,0.12); tone(700,0.1,"sine",0.1,300); },
    fanfare(){ ensure(); [523,659,784,1047].forEach((f,i)=>setTimeout(()=>tone(f,0.18,"square",0.22),i*110)); },
  };
  function startMusic(){
    ensure(); if(!ac) return; stopMusic();
    // a gritty two-note bass loop + ticking hat, very lightweight
    const bass=[55,55,73,65], step=0.32; let beat=0;
    const id=setInterval(()=>{
      if(muted) return;
      tone(bass[beat%bass.length],0.26,"sawtooth",0.10);
      if(beat%2===0) tone(110,0.18,"triangle",0.05);
      tone(1200,0.02,"square",0.03); // hat
      beat++;
    }, step*1000);
    musicNodes.push({clear:()=>clearInterval(id)});
  }
  function stopMusic(){ musicNodes.forEach(n=>n.clear()); musicNodes=[]; }
  function toggleMute(){ muted=!muted; if(master) master.gain.value=muted?0:0.5; return muted; }
  function isMuted(){ return muted; }
  return {sfx, startMusic, stopMusic, toggleMute, isMuted, ensure};
})();

/* --------------------------------------------------------------- input ---- */
const keys = {};                 // physical key state
const pressed = {};              // edge: set on keydown, cleared after consume
let touchBlock = false;          // on-screen Block button (mobile), affects player 0
const P1KEYS = {left:"a", right:"d", up:"w", down:"s", light:"f", heavy:"g", special:"h"};
const P2KEYS = {left:"arrowleft", right:"arrowright", up:"arrowup", down:"arrowdown",
                light:",", heavy:".", special:"/"};
window.addEventListener("keydown", e=>{
  const k=e.key.toLowerCase();
  if(["arrowup","arrowdown","arrowleft","arrowright"," ","/"].includes(k)) e.preventDefault();
  if(!keys[k]) pressed[k]=true;     // edge only on first press (ignore auto-repeat)
  keys[k]=true;
  Audio.ensure();
  handleMetaKeys(k);
});
window.addEventListener("keyup", e=>{ keys[e.key.toLowerCase()]=false; });
// also resume audio on any pointer
window.addEventListener("pointerdown", ()=>Audio.ensure());

function consume(k){ if(pressed[k]){ pressed[k]=false; return true; } return false; }
function held(k){ return !!keys[k]; }

/* --------------------------------------------------------------- game ----- */
const STATE = {TITLE:"title", SELECT:"select", INTRO:"intro", FIGHT:"fight",
               ROUND_END:"roundend", FINISH:"finish", MATCH_END:"matchend"};
let game = {
  state: STATE.TITLE,
  mode: "cpu",            // "cpu" | "2p"
  selectIndex:[0,3],      // p1, p2 cursor positions in select grid
  selectLocked:[false,false],
  fighters:[null,null],   // active Fighter instances
  roundWins:[0,0],
  round:1,
  timer:0,                // seconds remaining * 60 ticks
  banner:null,            // {text, sub, t, color}
  particles:[],
  projectiles:[],
  shake:0,
  flash:0,
  stage:"yard",
  finishWinner:-1,
  finishTimer:0,
  finishDone:false,
  t:0,                    // global tick
};

/* ------------------------------------------------------------- Fighter ---- */
class Fighter {
  constructor(defId, side){
    this.def = byId[defId];
    this.s = deriveStats(this.def.stats);
    this.side = side;                  // 0 = left start, 1 = right start
    this.player = side;                // controlling player index
    this.x = side===0 ? 300 : W-300;
    this.y = GROUND;
    this.vx=0; this.vy=0;
    this.facing = side===0 ? 1 : -1;
    this.w = this.def.body.len*0.7;
    this.hStand = this.def.body.height;
    this.onGround=true;
    this.crouch=false;
    this.hp = this.s.maxHp; this.maxHp=this.s.maxHp;
    this.meter=0;
    this.rage=0;                       // Lucy berserk meter
    this.state="idle";                 // idle|walk|jump|crouch|attack|hitstun|block|ko|win|dizzy
    this.move=null;                    // current move data
    this.moveT=0;                       // frames into current move
    this.moveHasHit=false;
    this.lastHitTick=-99;
    this.stun=0;
    this.animT=0;
    this.walkPhase=0;
    this.blinkT=Math.random()*200;
    this.aiTimer=0; this.aiIntent=null; this.aiReactBuf=0;
    this.flashHurt=0;
    this.koSpin=0;
    this.hpGhost=this.hp;              // lagging "chip" health for the HUD bar
  }
  get top(){ return this.y - this.curHeight(); }
  curHeight(){ return this.crouch ? this.hStand*0.62 : this.hStand; }
  hurtbox(){
    const h=this.curHeight();
    return {x:this.x-this.w/2, y:this.y-h, w:this.w, h:h};
  }
  canAct(){ return ["idle","walk","crouch","block"].includes(this.state) && this.onGround; }
  isBlockingDir(opp){
    // holding away from opponent (or the mobile Block button) and not attacking
    if(this.player===0 && touchBlock) return true;
    const awayKey = (opp.x>this.x) ? "left" : "right";
    const km = this.player===0?P1KEYS:P2KEYS;
    return held(km[awayKey]);
  }

  startMove(move){
    this.move = move; this.moveT=0; this.moveHasHit=false; this.state="attack";
    this.lastHitTick=-99;
    if(move.special){
      this.meter -= 50;
      if(move.kind==="dash"){ this.vx = this.facing*9; }
      if(move.kind==="slam"){ this.vx = this.facing*5; this.vy=-6; this.onGround=false; }
      Audio.sfx.growl();
    } else {
      Audio.sfx.bark();
    }
  }

  takeHit(move, attacker, blocked){
    const raw = move.dmg * attacker.s.dmgMult * this.s.takenMult;
    if(blocked){
      const chip = raw*0.14;
      this.hp -= chip;
      this.meter = Math.min(100, this.meter+4);
      this.vx = attacker.facing * (move.kb*0.35);
      this.stun = Math.floor(move.hitstun*0.5);
      this.state="block";
      game.shake = Math.max(game.shake, 3);
      game.hitstop = Math.max(game.hitstop, 2);
      Audio.sfx.block();
      const bx=this.x+attacker.facing*-this.w*0.3, by=this.top+this.curHeight()*0.5;
      spawnSpark(bx, by, "#cfe0ff", 6);
      spawnRing(bx, by, "#bcd0ff", 26, 3);
    } else {
      this.hp -= raw;
      this.vx = attacker.facing * move.kb;
      if(move.knockdown || move.special) this.vy = -7, this.onGround=false;
      this.stun = move.hitstun;
      this.state="hitstun";
      this.flashHurt=6;
      attacker.rage = 0; // attacker spent aggression
      game.shake = Math.max(game.shake, move.special?12:(move.name==="heavy"?8:5));
      game.flash = move.special?6:0;
      game.hitstop = Math.max(game.hitstop, move.special?7:(move.name==="heavy"?5:3));
      if(move.special||move.name==="heavy") Audio.sfx.heavy(); else Audio.sfx.hit();
      const ix=this.x+attacker.facing*-this.w*0.3, iy=this.top+this.curHeight()*0.45;
      const col = move.special?attacker.def.special.color:"#ffd34a";
      spawnSpark(ix, iy, col, move.special?18:10);
      spawnRing(ix, iy, col, move.special?70:46, move.special?6:4);
      spawnStar(ix, iy, col, move.special?1.5:1);
      // Lucy gains rage when SHE lands aggression-fueled hits handled by attacker below
    }
    if(this.hp<0) this.hp=0;
  }

  // build the active hitbox for the current move (or null)
  activeHitbox(){
    if(this.state!=="attack"||!this.move) return null;
    const m=this.move;
    const inActive = this.moveT>=m.startup && this.moveT<m.startup+m.active;
    if(!inActive) return null;
    const reachY = this.crouch||m.height==="low" ? this.y-20 : this.top+this.curHeight()*0.4;
    const hbw = m.reach, hbh = m.height==="low"?34:44;
    const hx = this.facing>0 ? this.x+this.w*0.3 : this.x-this.w*0.3-hbw;
    return {x:hx, y:reachY-hbh/2, w:hbw, h:hbh, m};
  }

  update(opp){
    this.animT++; this.blinkT++;
    if(this.flashHurt>0) this.flashHurt--;

    if(this.state==="ko"){ this.koSpin+=0.2; this.applyPhysics(); return; }
    if(this.state==="win"||this.state==="dizzy"){ this.applyPhysics(); return; }

    // face the opponent when free to do so
    if(this.canAct()) this.facing = (opp.x>this.x)?1:-1;

    // stun handling
    if(this.state==="hitstun"||this.state==="block"){
      this.stun--;
      if(this.stun<=0){ this.state="idle"; this.vx*=0.5; }
      this.applyPhysics(); return;
    }

    // attack frame progression
    if(this.state==="attack"){
      this.moveT++;
      const m=this.move;
      if(this.moveT>=m.startup+m.active+m.recovery){
        this.state = this.onGround?"idle":"jump"; this.move=null;
      }
      // dash special keeps momentum, decay others
      if(!(m.special&&m.kind==="dash")) this.vx*=0.8;
      this.applyPhysics();
      return;
    }

    // ---- free actions: human or AI provides intent ----
    let cmd;
    if(game.mode==="cpu" && this.player===1) cmd = this.aiThink(opp);
    else cmd = this.readInput();

    this.crouch = cmd.down && this.onGround;

    // movement
    if(this.onGround){
      if(cmd.left||cmd.right){
        const dir = cmd.left?-1:1;
        const blocking = this.isBlockingDir(opp) && !this.crouch;
        this.vx = dir*this.s.walk;
        this.state = (dir===-this.facing && (opp.x>this.x? dir<0:dir>0)) ? "walk":"walk";
        if(this.animT%14===0 && Math.abs(this.vx)>1) Audio.sfx.move();
      } else { this.vx*=0.6; this.state = this.crouch?"crouch":"idle"; }
    }

    // block state visual
    if(this.onGround && !cmd.left && !cmd.right && this.isBlockingDir(opp)) this.state="block";

    // jump
    if(cmd.up && this.onGround){
      this.vy = -this.s.jump; this.onGround=false; this.state="jump"; Audio.sfx.jump();
    }

    // attacks
    if(cmd.light) this.tryAttack("light");
    else if(cmd.heavy) this.tryAttack(this.crouch?"sweep":"heavy");
    else if(cmd.special && this.meter>=50) this.startMove({...this.def.special, special:true,
        startup:10, active:this.def.special.kind==="flurry"?22:8,
        recovery:18, range:this.def.special.kind==="projectile"?40:96,
        reach:this.def.special.kind==="dash"?64:60, kb:12, hitstun:28, height:"mid",
        hits:this.def.special.hits||1, name:"special"});

    this.applyPhysics();
  }

  tryAttack(which){
    const base = MOVES[which];
    this.startMove({...base, special:false});
  }

  readInput(){
    const k = this.player===0?P1KEYS:P2KEYS;
    return {
      left:held(k.left), right:held(k.right), up:held(k.up), down:held(k.down),
      light:consume(k.light), heavy:consume(k.heavy), special:consume(k.special),
    };
  }

  aiThink(opp){
    const cmd={left:false,right:false,up:false,down:false,light:false,heavy:false,special:false};
    const dx = opp.x-this.x, adx=Math.abs(dx), dir=Math.sign(dx)||1;
    this.aiTimer--;

    // reactive block: if opponent is attacking & close, sometimes hold away
    if(opp.state==="attack" && adx<140 && Math.random()<this.s.aiBlock){
      if(dir>0) cmd.left=true; else cmd.right=true;
      if(opp.move && opp.move.height==="low") cmd.down=true;
      return cmd;
    }

    if(this.aiTimer>0 && this.aiIntent){
      // continue current intent
      Object.assign(cmd, this.aiIntent.hold||{});
      return cmd;
    }

    // pick a new intent
    this.aiTimer = Math.floor(this.s.aiReact + Math.random()*14);
    const closeRange = 92, midRange=180;
    const hpRatio = this.hp/this.maxHp;
    const r = Math.random();

    if(adx>midRange){
      // approach (clever dogs dash, Teenie may zone with projectile)
      if(this.def.special.kind==="projectile" && this.meter>=50 && r<0.4){
        this.aiIntent={hold:{}}; cmd.special=true; this.aiTimer=20; return cmd;
      }
      this.aiIntent={hold:{[dir>0?"right":"left"]:true}};
    } else if(adx>closeRange){
      if(r < this.s.aiApproach) this.aiIntent={hold:{[dir>0?"right":"left"]:true}};
      else if(r < this.s.aiApproach+0.18 && this.meter>=50){ cmd.special=true; this.aiIntent={hold:{}}; }
      else if(opp.top < this.top-30 && r<0.3){ cmd.up=true; this.aiIntent={hold:{}}; } // anti-air-ish
      else this.aiIntent={hold:{[dir>0?"right":"left"]:true}};
    } else {
      // in range: attack based on aggression
      if(this.meter>=50 && r<this.s.aiAtk*0.6){ cmd.special=true; }
      else if(r < this.s.aiAtk){ cmd.heavy=true; }
      else if(r < this.s.aiAtk+0.35){ cmd.light=true; }
      else if(r < this.s.aiAtk+0.45){ cmd.down=true; cmd.heavy=true; } // sweep
      else if(r < 0.92){ if(dir>0)cmd.left=true;else cmd.right=true; } // back off / space
      else cmd.up=true;
      this.aiIntent={hold:{}};
      this.aiTimer=Math.floor(this.s.aiReact+6);
    }
    Object.assign(cmd, this.aiIntent.hold||{});
    return cmd;
  }

  applyPhysics(){
    this.x += this.vx;
    if(!this.onGround){ this.vy += GRAVITY; this.y += this.vy; }
    if(this.y>=GROUND){ this.y=GROUND; this.vy=0;
      if(!this.onGround && this.state==="jump") this.state="idle";
      this.onGround=true;
    }
    // walls
    const half=this.w/2;
    if(this.x<ARENA_PAD+half) this.x=ARENA_PAD+half;
    if(this.x>W-ARENA_PAD-half) this.x=W-ARENA_PAD-half;
    if(Math.abs(this.vx)>0.8) this.walkPhase += this.vx*0.06;
  }
}

/* --------------------------------------------------- particles & FX ------- */
function spawnSpark(x,y,color,n){
  for(let i=0;i<n;i++){
    const a=Math.random()*Math.PI*2, sp=2+Math.random()*5;
    game.particles.push({x,y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp-1,life:18+Math.random()*12,
      max:30,color,size:2+Math.random()*3});
  }
}
function spawnDust(x,y){
  for(let i=0;i<6;i++){
    game.particles.push({x:x+(Math.random()-0.5)*20,y,vx:(Math.random()-0.5)*3,vy:-Math.random()*2,
      life:16,max:16,color:"rgba(200,200,200,0.5)",size:3+Math.random()*3});
  }
}
function updateParticles(){
  for(const p of game.particles){ p.x+=p.vx; p.y+=p.vy; p.vy+=0.25; p.life--; }
  game.particles = game.particles.filter(p=>p.life>0);
}

/* impact rings + star bursts (additive) */
function spawnRing(x,y,color,maxR,width){
  (game.fx||(game.fx=[])).push({kind:"ring",x,y,r:6,maxR,life:14,max:14,color,width});
}
function spawnStar(x,y,color,scale){
  (game.fx||(game.fx=[])).push({kind:"star",x,y,life:13,max:13,color,scale,rot:((x+y)%10)/10});
}
function updateFx(){
  if(!game.fx) return;
  for(const e of game.fx){ e.life--; if(e.kind==="ring") e.r += (e.maxR-e.r)*0.28; }
  game.fx = game.fx.filter(e=>e.life>0);
}
function drawFx(){
  if(!game.fx) return;
  ctx.save(); ctx.globalCompositeOperation="lighter";
  for(const e of game.fx){
    const k=e.life/e.max;
    if(e.kind==="ring"){
      ctx.globalAlpha=k*0.85; ctx.strokeStyle=e.color; ctx.lineWidth=e.width*k+0.5;
      ctx.beginPath(); ctx.arc(e.x,e.y,e.r,0,Math.PI*2); ctx.stroke();
    } else {
      ctx.globalAlpha=k; ctx.fillStyle=e.color;
      const s=(1.3-k)*24*e.scale;
      ctx.save(); ctx.translate(e.x,e.y); ctx.rotate(e.rot*Math.PI);
      ctx.beginPath();
      for(let i=0;i<8;i++){ const a=i/8*Math.PI*2, rr=i%2?s*0.38:s; ctx.lineTo(Math.cos(a)*rr,Math.sin(a)*rr); }
      ctx.closePath(); ctx.fill(); ctx.restore();
    }
  }
  ctx.restore(); ctx.globalAlpha=1;
}

/* per-stage ambient atmosphere (snow / pollen / dust motes / embers) */
const AMBIENT = {
  snow:   {n:70, vx:-0.2, vy:0.75, size:2.2, swayAmt:0.5, color:"#ffffff", glow:false},
  yard:   {n:34, vx:0.10, vy:0.22, size:2.0, swayAmt:0.6, color:"#d6efa6", glow:true},
  kitchen:{n:38, vx:0.05, vy:-0.16, size:1.8, swayAmt:0.4, color:"#ffd49a", glow:true},
  garage: {n:34, vx:0.05, vy:0.10, size:1.6, swayAmt:0.3, color:"#9fb2cc", glow:true},
  living: {n:42, vx:0.03, vy:-0.12, size:1.8, swayAmt:0.4, color:"#ffe6b8", glow:true},
};
function initAmbient(stage){
  const cfg=AMBIENT[stage]||AMBIENT.yard; game.ambientCfg=cfg; game.ambient=[];
  for(let i=0;i<cfg.n;i++) game.ambient.push({
    x:Math.random()*W, y:Math.random()*GROUND,
    vx:cfg.vx*(0.5+Math.random()), vy:cfg.vy*(0.5+Math.random()),
    size:cfg.size*(0.5+Math.random()), a:0.18+Math.random()*0.4, sway:Math.random()*6.28});
}
function updateAmbient(){
  if(!game.ambient) return; const c=game.ambientCfg;
  for(const p of game.ambient){
    p.sway+=0.02; p.x+=p.vx+Math.sin(p.sway)*c.swayAmt; p.y+=p.vy;
    if(p.y>GROUND+4){ p.y=-5; p.x=Math.random()*W; }
    if(p.y<-10){ p.y=GROUND; p.x=Math.random()*W; }
    if(p.x>W+10) p.x=-10; if(p.x<-10) p.x=W+10;
  }
}
function drawAmbient(){
  if(!game.ambient) return; const c=game.ambientCfg;
  ctx.save(); if(c.glow) ctx.globalCompositeOperation="lighter";
  for(const p of game.ambient){ ctx.globalAlpha=p.a; ctx.fillStyle=c.color;
    ctx.beginPath(); ctx.arc(p.x,p.y,p.size,0,Math.PI*2); ctx.fill(); }
  ctx.restore(); ctx.globalAlpha=1;
}

/* small circular head portrait for the HUD */
function drawPortrait(def,x,y,r){
  ctx.save();
  ctx.beginPath(); ctx.arc(x,y,r,0,Math.PI*2); ctx.clip();
  const st=STAGES[def.stage]||STAGES.yard;
  ctx.fillStyle=vGrad(y-r,y+r,st.sky[0],st.sky[1]); ctx.fillRect(x-r,y-r,2*r,2*r);
  const f={def,animT:game.t,blinkT:50,state:"idle",facing:1,crouch:false,
    curHeight:()=>def.body.height,top:0,s:deriveStats(def.stats),rage:0,move:null,flashHurt:0,koSpin:0};
  ctx.translate(x, y+r*0.55); const sc=r/30; ctx.scale(sc,sc);
  drawHead(0, -def.body.height*0.5, def.colors, def.body, false, 0, f);
  ctx.restore();
  ctx.beginPath(); ctx.arc(x,y,r,0,Math.PI*2); ctx.lineWidth=2.5; ctx.strokeStyle="rgba(0,0,0,0.55)"; ctx.stroke();
}

/* ----------------------------------------------------------- projectiles -- */
function spawnProjectile(owner){
  const dir=owner.facing;
  game.projectiles.push({
    x:owner.x+dir*owner.w*0.5, y:owner.top+owner.curHeight()*0.45,
    vx:dir*7, owner:owner.player, dmg:owner.def.special.dmg, color:owner.def.special.color,
    r:18, life:120, kb:9, hitstun:22, def:owner,
  });
}
function updateProjectiles(){
  const F=game.fighters;
  for(const pr of game.projectiles){
    pr.x+=pr.vx; pr.life--; pr.r=18+Math.sin(game.t*0.4)*2;
    const target = F[1-pr.owner];
    if(target){
      const hb=target.hurtbox();
      if(pr.x>hb.x-pr.r && pr.x<hb.x+hb.w+pr.r && pr.y>hb.y && pr.y<hb.y+hb.h
         && !["ko","dizzy"].includes(target.state)){
        const blocked = target.isBlockingDir(F[pr.owner]) && target.state!=="attack" && target.onGround;
        target.takeHit({dmg:pr.dmg,kb:pr.kb,hitstun:pr.hitstun,height:"mid"}, pr.def, blocked);
        pr.life=0;
      }
    }
    if(pr.x<0||pr.x>W) pr.life=0;
  }
  game.projectiles = game.projectiles.filter(p=>p.life>0);
}

/* --------------------------------------------------------- combat resolve - */
function resolveCombat(){
  const [a,b]=game.fighters;
  pushApart(a,b);
  tryConnect(a,b);
  tryConnect(b,a);
  // spawn projectile at the right frame for Teenie
  for(const f of game.fighters){
    if(f.state==="attack"&&f.move&&f.move.special&&f.def.special.kind==="projectile"
       && f.moveT===f.move.startup && !f.moveHasHit){
      spawnProjectile(f); f.moveHasHit=true; Audio.sfx.whoosh();
    }
  }
}
function pushApart(a,b){
  const ah=a.hurtbox(), bh=b.hurtbox();
  if(ah.x<bh.x+bh.w && ah.x+ah.w>bh.x && a.onGround && b.onGround){
    const overlap = Math.min(ah.x+ah.w-bh.x, bh.x+bh.w-ah.x);
    const push = overlap/2;
    if(a.x<b.x){ a.x-=push; b.x+=push; } else { a.x+=push; b.x-=push; }
  }
}
function tryConnect(att, def){
  const hb=att.activeHitbox(); if(!hb) return;
  if(["ko","dizzy"].includes(def.state)) return;
  const m=hb.m;
  const multi = m.special && m.hits>1;
  if(att.moveHasHit && !multi) return;
  if(multi && game.t-att.lastHitTick < 4) return;  // multi-hit interval
  const d=def.hurtbox();
  if(hb.x<d.x+d.w && hb.x+hb.w>d.x && hb.y<d.y+d.h && hb.y+hb.h>d.y){
    // block check
    const blocked = def.onGround && def.state!=="attack" && def.isBlockingDir(att) &&
                    !(m.height==="low" && !def.crouch);   // lows beat standing block
    def.takeHit(m, att, blocked);
    att.moveHasHit = true; att.lastHitTick=game.t;
    att.meter = Math.min(100, att.meter + (m.meter||6)*att.s.meterGain);
    if(att.s.rage && !blocked){ att.rage=Math.min(100, att.rage+22); }
    if(!blocked) checkKO(def);
  }
}
function checkKO(f){
  if(f.hp<=0 && f.state!=="ko" && f.state!=="dizzy"){
    endRound(f);
  }
}

/* ----------------------------------------------------------- round flow --- */
function startMatch(){
  game.fighters=[ new Fighter(FIGHTERS[game.selectIndex[0]].id,0),
                  new Fighter(FIGHTERS[game.selectIndex[1]].id,1) ];
  game.roundWins=[0,0]; game.round=1;
  game.stage = game.fighters[1].def.stage;
  initAmbient(game.stage);
  Audio.startMusic();
  startRound();
}
function startRound(){
  const [a,b]=game.fighters;
  a.x=300; b.x=W-300; a.y=b.y=GROUND; a.vx=a.vy=b.vx=b.vy=0;
  a.hp=a.maxHp; b.hp=b.maxHp; a.hpGhost=a.hp; b.hpGhost=b.hp;
  a.meter=Math.min(a.meter,30); b.meter=Math.min(b.meter,30);
  a.state=b.state="idle"; a.move=b.move=null; a.facing=1; b.facing=-1;
  a.crouch=b.crouch=false; a.onGround=b.onGround=true; a.rage=b.rage=0;
  game.projectiles=[]; game.particles=[];
  game.timer = 60*60; // 60 seconds
  game.state = STATE.INTRO;
  game.banner = {text:`ROUND ${game.round}`, sub:"", t:0, color:"#ffcf4a", phase:"round"};
}
function endRound(loser){
  const winner = game.fighters[1-loser.player];
  loser.state="ko"; loser.vy=-6; loser.onGround=false; loser.koSpin=0;
  winner.state="win";
  game.roundWins[winner.player]++;
  Audio.sfx.ko();
  game.shake=16; game.flash=8; game.hitstop=10;
  spawnRing(loser.x, loser.top+loser.curHeight()*0.5, "#ff3b3b", 120, 8);
  spawnStar(loser.x, loser.top+loser.curHeight()*0.5, "#ffcf4a", 2);
  const matchOver = game.roundWins[winner.player]>=2;
  if(matchOver){
    // Mortal-Kombat finisher window
    game.finishWinner = winner.player; game.finishTimer=60*5; game.finishDone=false;
    setTimeout(()=>{
      if(game.state===STATE.ROUND_END){
        loser.state="dizzy";
        game.state=STATE.FINISH;
        game.banner={text:"FINISH THEM!", sub:"press SPECIAL", t:0, color:"#ff3b3b", phase:"finish"};
        Audio.sfx.growl();
      }
    }, 1100);
  }
  game.state=STATE.ROUND_END;
  game.banner={text: loser.hp<=0?"K.O.":"TIME", sub:"", t:0, color:"#ff3b3b", phase:"ko"};
  game.roundEndT=0;
}

/* perform the comedic finisher */
function doFinisher(){
  const win=game.fighters[game.finishWinner], lose=game.fighters[1-game.finishWinner];
  game.finishDone=true;
  win.state="attack"; win.move={...win.def.special,special:true,startup:0,active:30,recovery:0,
    range:0,reach:0,kb:0,hitstun:0,height:"mid",name:"finisher"};
  win.moveT=0;
  Audio.sfx.growl(); Audio.sfx.heavy();
  game.shake=24; game.flash=10;
  // big burst of fur
  for(let i=0;i<60;i++) spawnSpark(lose.x,lose.top+lose.curHeight()*0.5,
      win.def.special.color, 1);
  setTimeout(()=>{
    lose.state="ko"; lose.vy=-10; lose.vx=win.facing*8; lose.onGround=false;
    game.shake=20;
    spawnSpark(lose.x,lose.top+30,"#ff5a3c",40);
  },500);
  setTimeout(()=>finishToMatchEnd(true),1500);
}
function finishToMatchEnd(fatality){
  const winner=game.fighters[game.finishWinner>=0?game.finishWinner:
                (game.roundWins[0]>game.roundWins[1]?0:1)];
  const flawless = winner.hp>=winner.maxHp-0.01;
  game.state=STATE.MATCH_END;
  game.banner={text:`${winner.def.name} WINS`,
    sub: fatality?"FUR-TALITY!":(flawless?"FLAWLESS VICTORY":"VICTORY"),
    t:0, color: fatality?"#ff3b3b":"#ffcf4a", phase:"match"};
  winner.state="win";
  Audio.sfx.fanfare(); Audio.stopMusic();
}

/* --------------------------------------------------------------- TICK ----- */
function tick(){
  game.t++;
  if(game.shake>0) game.shake*=0.86;
  if(game.flash>0) game.flash--;
  updateParticles();
  updateFx();
  updateAmbient();
  // lagging "chip" health drains smoothly toward real health
  if(game.fighters[0]) for(const f of game.fighters){
    if(f.hpGhost>f.hp) f.hpGhost = Math.max(f.hp, f.hpGhost-0.9);
    else f.hpGhost = f.hp;
  }
  // hitstop: freeze gameplay for a few frames on impact for punch
  if(game.hitstop>0){ game.hitstop--; return; }

  switch(game.state){
    case STATE.TITLE: tickTitle(); break;
    case STATE.SELECT: tickSelect(); break;
    case STATE.INTRO: tickIntro(); break;
    case STATE.FIGHT: tickFight(); break;
    case STATE.ROUND_END: tickRoundEnd(); break;
    case STATE.FINISH: tickFinish(); break;
    case STATE.MATCH_END: tickMatchEnd(); break;
  }
}

function tickTitle(){
  if(consume("enter")||consume(" ")||consume(P1KEYS.special)){ Audio.sfx.select(); game.mode="cpu"; gotoSelect(); }
  if(consume("2")){ Audio.sfx.select(); game.mode="2p"; gotoSelect(); }
  if(consume("1")){ Audio.sfx.select(); game.mode="cpu"; gotoSelect(); }
}
function gotoSelect(){
  game.state=STATE.SELECT; game.selectLocked=[false,false];
  game.selectIndex=[0, game.mode==="2p"?1:3];
}

function moveCursor(p, d){
  const n=FIGHTERS.length;
  game.selectIndex[p] = (game.selectIndex[p]+d+n)%n;
  Audio.sfx.move();
}
function tickSelect(){
  // P1 navigation
  if(!game.selectLocked[0]){
    if(consume(P1KEYS.left)) moveCursor(0,-1);
    if(consume(P1KEYS.right)) moveCursor(0,1);
    if(consume(P1KEYS.light)||consume(P1KEYS.special)||consume("enter")){
      game.selectLocked[0]=true; Audio.sfx.select();
    }
  } else if(consume(P1KEYS.heavy)) { game.selectLocked[0]=false; }

  // P2 / CPU navigation
  if(game.mode==="2p"){
    if(!game.selectLocked[1]){
      if(consume(P2KEYS.left)) moveCursor(1,-1);
      if(consume(P2KEYS.right)) moveCursor(1,1);
      if(consume(P2KEYS.light)||consume(P2KEYS.special)) { game.selectLocked[1]=true; Audio.sfx.select(); }
    } else if(consume(P2KEYS.heavy)){ game.selectLocked[1]=false; }
  } else {
    game.selectLocked[1]=true; // CPU auto-ready
  }

  if(consume("escape")){ game.state=STATE.TITLE; }

  if(game.selectLocked[0] && game.selectLocked[1]){
    if(game.mode==="cpu"){
      // CPU picks a random different fighter
      let c; do{ c=Math.floor(Math.random()*FIGHTERS.length); }while(c===game.selectIndex[0]&&FIGHTERS.length>1);
      game.selectIndex[1]=c;
    }
    startMatch();
  }
}
function tickIntro(){
  game.banner.t++;
  if(game.banner.t===1) Audio.sfx.bark();
  if(game.banner.t>70){
    game.state=STATE.FIGHT;
    game.banner={text:"FIGHT!", sub:"", t:0, color:"#ff3b3b", phase:"fight"};
    Audio.sfx.growl();
  }
  if(consume("escape")) abortToMenu();
}
function tickFight(){
  if(consume("escape")){ abortToMenu(); return; }
  const [a,b]=game.fighters;
  a.update(b); b.update(a);
  resolveCombat();
  updateProjectiles();
  if(game.banner){ game.banner.t++; if(game.banner.t>50) game.banner=null; }
  // round timer
  game.timer--;
  if(game.timer<=0){
    const loser = a.hp<=b.hp ? a : b;
    endRound(loser);
  }
  // dust on landing
  for(const f of game.fighters){
    if(!f._wasGround && f.onGround){ spawnDust(f.x, f.y); }
    f._wasGround=f.onGround;
  }
}
function tickRoundEnd(){
  const [a,b]=game.fighters;
  a.update(b); b.update(a);
  pushApart(a,b);
  if(game.banner) game.banner.t++;
  game.roundEndT=(game.roundEndT||0)+1;
  // if not a match-ending round, advance after a beat
  const someoneWonMatch = game.roundWins[0]>=2||game.roundWins[1]>=2;
  if(!someoneWonMatch && game.roundEndT>120){
    game.round++; startRound();
  }
  if(consume("escape")) abortToMenu();
}
function tickFinish(){
  const [a,b]=game.fighters;
  a.update(b); b.update(a);
  if(game.banner) game.banner.t++;
  game.finishTimer--;
  // winner presses special to finish
  const winKeys = game.finishWinner===0?P1KEYS:P2KEYS;
  const pressedSpecial = game.mode==="cpu"&&game.finishWinner===1
      ? (game.finishTimer<200)          // CPU just does it
      : consume(winKeys.special);
  if(!game.finishDone && (pressedSpecial)){
    doFinisher();
  } else if(!game.finishDone && game.finishTimer<=0){
    finishToMatchEnd(false);            // window expired -> normal victory
  }
  if(consume("escape")) abortToMenu();
}
function tickMatchEnd(){
  const [a,b]=game.fighters;
  a.update(b); b.update(a);
  if(game.banner) game.banner.t++;
  if(consume("enter")||consume(" ")||consume(P1KEYS.special)){ Audio.sfx.select(); gotoSelect(); }
  if(consume("escape")) abortToMenu();
}
function abortToMenu(){ Audio.stopMusic(); game.state=STATE.TITLE; game.banner=null; }

function handleMetaKeys(k){
  if(k==="m"){ const m=Audio.toggleMute(); }
}

/* ================================================================ RENDER == */
function render(){
  ctx.save();
  // screen shake
  if(game.shake>0.5){
    ctx.translate((Math.random()-0.5)*game.shake, (Math.random()-0.5)*game.shake);
  }
  ctx.clearRect(-30,-30,W+60,H+60);

  switch(game.state){
    case STATE.TITLE: drawTitle(); break;
    case STATE.SELECT: drawSelect(); break;
    default: drawArena();
  }
  ctx.restore();

  if(game.flash>0){
    ctx.fillStyle=`rgba(255,255,255,${game.flash/16})`;
    ctx.fillRect(0,0,W,H);
  }
  drawVignette();
  drawMuteIcon();
}

let _vig=null;
function drawVignette(){
  if(!_vig){
    _vig=ctx.createRadialGradient(W/2,H*0.45,H*0.35, W/2,H*0.5,H*0.9);
    _vig.addColorStop(0,"rgba(0,0,0,0)");
    _vig.addColorStop(0.7,"rgba(0,0,0,0.12)");
    _vig.addColorStop(1,"rgba(0,0,0,0.5)");
  }
  ctx.fillStyle=_vig; ctx.fillRect(0,0,W,H);
}

/* ---------- backgrounds (layered parallax scenes) ---------- */
const STAGES = {
  snow: {
    sky:["#0e2740","#2f5f86","#7aa7c8"], light:"#cfe8ff", lightX:0.74, lightY:0.20,
    floor:["#eef4fb","#bcd0e4"], shadow:"#a8c0d6",
    layers:[ {type:"mountains", base:0.66, h:0.50, n:5, color:"#234d6e"},
             {type:"pines", base:0.90, h:0.34, n:11, color:"#1b3a52"} ],
  },
  yard: {
    sky:["#27406a","#5c7e9a","#9ab8a0"], light:"#ffe6a0", lightX:0.20, lightY:0.22,
    floor:["#8a6a40","#5f4628"], shadow:"#4f3a22",
    layers:[ {type:"buildings", base:0.78, h:0.46, n:7, color:"#2d4a55"},
             {type:"fence", base:0.92, color:"#6b4f30"} ],
  },
  kitchen: {
    sky:["#5a4438","#7c5d49","#9a7860"], light:"#ffd9a0", lightX:0.50, lightY:0.12,
    floor:["#d8c096","#b0916a"], shadow:"#7a6044",
    layers:[ {type:"room", color:"#7c5d49", win:true, glassTop:"#ffd9a0", accent:"#ff8a3c"},
             {type:"shelves", base:0.60, color:"#6a4d3a"} ],
  },
  garage: {
    sky:["#23262d","#3a3f49","#565d68"], light:"#aebfd6", lightX:0.50, lightY:0.10,
    floor:["#6a6f78","#444851"], shadow:"#2e323a",
    layers:[ {type:"room", color:"#3a3f49", win:false, accent:"#9fb2cc"},
             {type:"shelves", base:0.52, color:"#33373f"} ],
  },
  living: {
    sky:["#352a4e","#5a4a7a","#7d6aa0"], light:"#ffdca0", lightX:0.80, lightY:0.16,
    floor:["#9a7a52","#6a4f33"], shadow:"#4a3a5e",
    layers:[ {type:"room", color:"#5a4a7a", win:true, glassTop:"#ffd29a", accent:"#ffcf4a"},
             {type:"shelves", base:0.74, color:"#4a3a5e"} ],
  },
};
function drawStage(){
  const st=STAGES[game.stage]||STAGES.yard;
  // sky / back wall
  const g=ctx.createLinearGradient(0,0,0,GROUND+40);
  st.sky.forEach((c,i)=>g.addColorStop(i/(st.sky.length-1),c));
  ctx.fillStyle=g; ctx.fillRect(0,0,W,GROUND+40);
  // light source glow + disc
  if(st.light){
    const lx=W*st.lightX, ly=GROUND*st.lightY;
    const rg=ctx.createRadialGradient(lx,ly,8,lx,ly,380);
    rg.addColorStop(0,rgba(st.light,0.55)); rg.addColorStop(1,rgba(st.light,0));
    ctx.fillStyle=rg; ctx.fillRect(0,0,W,GROUND);
    ctx.fillStyle=rgba(st.light,0.9); ctx.beginPath(); ctx.arc(lx,ly,24,0,Math.PI*2); ctx.fill();
  }
  // parallax layers
  for(const L of st.layers) drawLayer(L,st);
  // atmosphere behind fighters
  drawAmbient();
  // floor
  const fg=ctx.createLinearGradient(0,GROUND,0,H);
  fg.addColorStop(0,st.floor[0]); fg.addColorStop(1,st.floor[1]);
  ctx.fillStyle=fg; ctx.fillRect(0,GROUND,W,H-GROUND);
  ctx.fillStyle="rgba(0,0,0,0.22)"; ctx.fillRect(0,GROUND,W,5);            // contact shadow
  ctx.fillStyle="rgba(255,255,255,0.05)"; ctx.fillRect(0,GROUND+5,W,26);   // gloss band
  // perspective floor lines
  ctx.strokeStyle=rgba(st.shadow,0.45); ctx.lineWidth=2;
  for(let x=-200;x<W+200;x+=72){ ctx.beginPath(); ctx.moveTo(x,GROUND+8); ctx.lineTo((x-W/2)*2.4+W/2,H); ctx.stroke(); }
}
function drawLayer(L,st){
  const baseY=GROUND*(L.base||1);
  ctx.fillStyle=L.color;
  if(L.type==="mountains"){
    for(let i=0;i<L.n;i++){
      const cx=(i+0.5)/L.n*W, w=W/L.n*1.35, h=GROUND*L.h*(0.6+(i*37%50)/100);
      ctx.fillStyle=L.color;
      ctx.beginPath(); ctx.moveTo(cx-w/2,baseY); ctx.lineTo(cx,baseY-h); ctx.lineTo(cx+w/2,baseY); ctx.closePath(); ctx.fill();
      ctx.fillStyle=rgba("#ffffff",0.55);
      ctx.beginPath(); ctx.moveTo(cx-w*0.12,baseY-h*0.76); ctx.lineTo(cx,baseY-h); ctx.lineTo(cx+w*0.12,baseY-h*0.76); ctx.closePath(); ctx.fill();
    }
    ctx.fillStyle=L.color; ctx.fillRect(0,baseY,W,GROUND-baseY);
  } else if(L.type==="pines"){
    for(let i=0;i<L.n;i++){ const cx=(i+0.5)/L.n*W+((i*53%30)-15), h=GROUND*L.h*(0.7+(i*29%40)/100); pine(cx,baseY,h,L.color); }
  } else if(L.type==="buildings"){
    ctx.fillStyle=L.color;
    for(let i=0;i<L.n;i++){
      const w=W/L.n*0.92, x=i*W/L.n+5, h=GROUND*L.h*(0.5+(i*43%60)/100);
      ctx.fillStyle=L.color; ctx.fillRect(x,baseY-h,w,h);
      ctx.fillStyle=rgba("#ffd98a",0.22);
      for(let wy=baseY-h+14; wy<baseY-12; wy+=22) for(let wx=x+8; wx<x+w-10; wx+=20) ctx.fillRect(wx,wy,9,12);
    }
    ctx.fillStyle=L.color; ctx.fillRect(0,baseY,W,GROUND-baseY);
  } else if(L.type==="fence"){
    ctx.fillStyle=L.color; ctx.fillRect(0,baseY,W,7);
    for(let x=8;x<W;x+=46){ ctx.fillRect(x,baseY-26,11,33);
      ctx.fillStyle=mix(L.color,0.12); ctx.fillRect(x+2,baseY-24,3,29); ctx.fillStyle=L.color; }
  } else if(L.type==="room"){
    ctx.fillStyle=mix(L.color,-0.2); ctx.fillRect(0,GROUND-18,W,18);       // baseboard
    if(L.win){
      const wx=W*0.58, wy=GROUND*0.18, ww=W*0.27, wh=GROUND*0.44;
      const wg=ctx.createLinearGradient(0,wy,0,wy+wh);
      wg.addColorStop(0,rgba(L.glassTop||"#aee0ff",0.7)); wg.addColorStop(1,rgba(mix(L.glassTop||"#aee0ff",-0.3),0.5));
      ctx.fillStyle=wg; ctx.fillRect(wx,wy,ww,wh);
      ctx.strokeStyle=mix(L.color,-0.4); ctx.lineWidth=10; ctx.strokeRect(wx,wy,ww,wh);
      ctx.lineWidth=6; ctx.beginPath();
      ctx.moveTo(wx+ww/2,wy); ctx.lineTo(wx+ww/2,wy+wh);
      ctx.moveTo(wx,wy+wh/2); ctx.lineTo(wx+ww,wy+wh/2); ctx.stroke();
    }
    ctx.fillStyle=mix(L.color,-0.3); ctx.fillRect(W*0.12,GROUND*0.24,72,56); // framed picture
    ctx.fillStyle=rgba(L.accent||"#ffcf4a",0.5); ctx.fillRect(W*0.12+8,GROUND*0.24+8,56,40);
  } else if(L.type==="shelves"){
    ctx.fillStyle=L.color; ctx.fillRect(0,baseY,W,GROUND-baseY-18);
    ctx.fillStyle=mix(L.color,0.10); ctx.fillRect(0,baseY,W,8);            // counter top
    ctx.strokeStyle=mix(L.color,-0.3); ctx.lineWidth=4;
    for(let sy=baseY+30; sy<GROUND-22; sy+=42){
      ctx.beginPath(); ctx.moveTo(0,sy); ctx.lineTo(W,sy); ctx.stroke();
      ctx.fillStyle=mix(L.color,0.13);
      for(let bx=30;bx<W-60;bx+=104) ctx.fillRect(bx,sy-26,52,22);
      ctx.fillStyle=L.color;
    }
  }
}
function pine(cx,baseY,h,color){
  ctx.fillStyle=mix(color,-0.25); ctx.fillRect(cx-3,baseY-h*0.18,6,h*0.18);
  ctx.fillStyle=color;
  for(let k=0;k<3;k++){ const ty=baseY-h*0.18-k*h*0.27, w=h*(0.36-k*0.09);
    ctx.beginPath(); ctx.moveTo(cx-w,ty); ctx.lineTo(cx,ty-h*0.36); ctx.lineTo(cx+w,ty); ctx.closePath(); ctx.fill(); }
  ctx.fillStyle=rgba("#ffffff",0.3); ctx.fillRect(cx-h*0.2,baseY-h*0.5,h*0.12,3);
}

/* ---------- arena (fight HUD + fighters) ---------- */
function drawArena(){
  drawStage();
  // soft contact shadows (tighter when airborne)
  for(const f of game.fighters){
    if(!f) continue;
    const air=clamp((GROUND-f.y)/160,0,1), sw=f.w*0.7*(1-air*0.45);
    const rg=ctx.createRadialGradient(f.x,GROUND+7,2,f.x,GROUND+7,sw);
    rg.addColorStop(0,`rgba(0,0,0,${0.34*(1-air*0.5)})`); rg.addColorStop(1,"rgba(0,0,0,0)");
    ctx.fillStyle=rg; ctx.beginPath(); ctx.ellipse(f.x,GROUND+7,sw,11,0,0,Math.PI*2); ctx.fill();
  }
  // mirror reflections on the polished floor
  ctx.save(); ctx.globalAlpha=0.14;
  for(const f of game.fighters){ if(!f) continue;
    ctx.save(); ctx.translate(0,GROUND*2); ctx.scale(1,-1); drawFighter(f,true); ctx.restore();
  }
  ctx.restore(); ctx.globalAlpha=1;
  // projectiles
  for(const pr of game.projectiles) drawPuff(pr);
  // fighters (draw far one first)
  const order = game.fighters[0].x<game.fighters[1].x ? [0,1]:[1,0];
  for(const i of order) drawFighter(game.fighters[i]);
  // particles (additive glow)
  ctx.save(); ctx.globalCompositeOperation="lighter";
  for(const p of game.particles){
    ctx.globalAlpha=Math.max(0,p.life/p.max);
    ctx.fillStyle=p.color;
    ctx.beginPath(); ctx.arc(p.x,p.y,p.size,0,Math.PI*2); ctx.fill();
  }
  ctx.restore(); ctx.globalAlpha=1;
  drawFx();

  drawHUD();
  if(game.banner) drawBanner(game.banner);
  if(game.state===STATE.FINISH) drawFinishTimer();
}

function drawPuff(pr){
  ctx.save();
  ctx.fillStyle=pr.color;
  ctx.beginPath();
  for(let i=0;i<10;i++){
    const a=i/10*Math.PI*2, rr=pr.r+(i%2?4:0);
    ctx.lineTo(pr.x+Math.cos(a)*rr, pr.y+Math.sin(a)*rr);
  }
  ctx.closePath(); ctx.fill();
  ctx.fillStyle="rgba(255,255,255,0.6)";
  ctx.beginPath(); ctx.arc(pr.x-4,pr.y-4,pr.r*0.3,0,Math.PI*2); ctx.fill();
  ctx.restore();
}

/* ---------- the dogs ---------- */
function drawFighter(f, refl){
  const d=f.def, c=d.colors, b=d.body;
  const t=f.animT;
  const crouch = f.crouch ? 0.62 : 1;
  const bodyH = b.height*crouch;
  const legLen = b.legLen*crouch;
  const cy = -legLen;                  // body center vertical anchor (above legs)
  const bodyLen = b.len;

  // dash afterimages (world space, behind the body)
  if(!refl && f.state==="attack" && f.move && f.move.special && f.move.kind==="dash"){
    for(let i=1;i<=3;i++){
      ctx.save(); ctx.globalAlpha=0.09*(4-i); ctx.fillStyle=d.special.color;
      ctx.beginPath();
      ctx.ellipse(f.x-f.facing*i*16, f.top+f.curHeight()*0.45, bodyLen*0.5, bodyH*0.32, 0,0,Math.PI*2);
      ctx.fill(); ctx.restore();
    }
  }

  ctx.save();
  ctx.translate(f.x, f.y);
  ctx.scale(f.facing, 1);             // face direction

  // KO spin / fall
  if(f.state==="ko"){
    ctx.translate(0,-f.curHeight()*0.4);
    ctx.rotate(f.koSpin);
    ctx.translate(0, f.curHeight()*0.4);
  }

  // animation pose params
  let lean=0, bob=0, legSwing=0, headDip=0, mouthOpen=0, armReach=0;
  if(f.state==="walk"){ legSwing=Math.sin(f.walkPhase*3)*10; bob=Math.abs(Math.sin(f.walkPhase*3))*-3; }
  if(f.state==="idle"||f.state==="block"){ bob=Math.sin(t*0.08)*2; }
  if(f.state==="jump"){ legSwing=-12; lean=6; }
  if(f.state==="crouch"){ headDip=6; }
  if(f.state==="attack" && f.move){
    const m=f.move, p=f.moveT;
    const phase = p< m.startup ? p/m.startup : (p<m.startup+m.active?1:1-(p-m.startup-m.active)/Math.max(1,m.recovery));
    armReach = phase* (m.special?54:m.name==="heavy"?40:28);
    lean = phase*10; mouthOpen=phase*8;
    if(m.special&&m.kind==="dash") lean=14;
  }
  if(f.state==="hitstun"){ lean=-10; headDip=4; mouthOpen=6; }
  if(f.state==="block"){ lean=-4; }
  if(f.state==="dizzy"){ bob=Math.sin(t*0.25)*3; mouthOpen=4; }
  if(f.state==="win"){ bob=Math.sin(t*0.2)*4; mouthOpen=Math.abs(Math.sin(t*0.2))*8; }

  // hurt flash
  const flash = !refl && f.flashHurt>0 && (f.flashHurt%2===0);

  ctx.translate(0, bob);

  // ----- tail (drawn behind body) -----
  drawTail(b.tail, -bodyLen*0.42, cy-bodyH*0.4, c, t, f.state);

  // ----- back legs -----
  legPair(-bodyLen*0.28, cy, legLen, -legSwing, c, b, 0, true);

  // ----- fluff halo behind body (fluffy breeds) -----
  const bx=-bodyLen*0.5, bw=bodyLen, by=cy-bodyH*0.55, bh=bodyH*0.62;
  if(b.fluff>0.4) drawFluff(bx,by,bw,bh,c.coat,t);

  // ----- body -----
  roundedBelly(bx,by,bw,bh,c,b,flash);

  // ----- front legs (with reach for attacks) -----
  legPair(bodyLen*0.30, cy, legLen, legSwing, c, b, armReach, false);

  // ----- neck + head (toward facing/front = +x) -----
  const hx = bodyLen*0.42 + lean*0.4, hy = cy-bodyH*0.78 + headDip;
  drawHead(hx,hy,c,b,flash,mouthOpen,f);

  // rage aura for Lucy
  if(!refl && f.s.rage && f.rage>30){
    ctx.save();
    ctx.globalAlpha=0.16+0.1*Math.sin(t*0.4);
    ctx.strokeStyle="#ff3b1f"; ctx.lineWidth=5+Math.sin(t*0.5)*2;
    ctx.beginPath(); ctx.ellipse(0,cy-bodyH*0.3,bodyLen*0.72,bodyH*0.62,0,0,Math.PI*2); ctx.stroke();
    ctx.restore();
  }

  ctx.restore();
}

function roundedBelly(x,y,w,h,c,b,flash){
  const r=Math.min(h*0.55, 28), out=mix(c.coat,-0.5);
  if(flash){
    roundRect(x,y,w,h,r); ctx.fillStyle="#fff"; ctx.fill();
    ctx.lineJoin="round"; ctx.lineWidth=3; ctx.strokeStyle="#ffd"; ctx.stroke(); return;
  }
  // gradient body
  roundRect(x,y,w,h,r);
  ctx.fillStyle=vGrad(y,y+h, mix(c.coat,0.22), mix(c.coat,-0.16)); ctx.fill();
  // clipped shading detail
  ctx.save(); roundRect(x,y,w,h,r); ctx.clip();
  ctx.fillStyle=rgba(c.shade,0.55);                                  // back/top shade
  ctx.beginPath(); ctx.ellipse(x+w*0.42,y-4,w*0.52,h*0.5,0,0,Math.PI*2); ctx.fill();
  ctx.fillStyle=rgba(c.belly,0.9);                                   // belly highlight
  ctx.beginPath(); ctx.ellipse(x+w*0.54,y+h*0.84,w*0.36,h*0.34,0,0,Math.PI*2); ctx.fill();
  ctx.strokeStyle=rgba(mix(c.coat,-0.28),0.22); ctx.lineWidth=2;     // fur streaks
  for(let i=0;i<5;i++){ const fx=x+w*(0.22+i*0.15);
    ctx.beginPath(); ctx.moveTo(fx,y+h*0.18); ctx.lineTo(fx-4,y+h*0.72); ctx.stroke(); }
  ctx.restore();
  // outline + rim light
  roundRect(x,y,w,h,r); ctx.lineJoin="round"; ctx.lineWidth=3; ctx.strokeStyle=out; ctx.stroke();
  ctx.strokeStyle=rgba(mix(c.coat,0.5),0.55); ctx.lineWidth=2.5;
  ctx.beginPath(); ctx.moveTo(x+r,y+1.6); ctx.lineTo(x+w-r,y+1.6); ctx.stroke();
}
function drawFluff(x,y,w,h,col,t){
  const lite=mix(col,0.25), out=mix(col,-0.4);
  const n=18, rx=w*0.56, ry=h*0.66, cx=x+w*0.5, cyc=y+h*0.5;
  for(let i=0;i<n;i++){
    const a=i/n*Math.PI*2, px=cx+Math.cos(a)*rx, py=cyc+Math.sin(a)*ry;
    const r=9+Math.sin(t*0.05+a*3)*1.6;
    ctx.fillStyle=col; ctx.beginPath(); ctx.arc(px,py,r,0,Math.PI*2); ctx.fill();
    ctx.fillStyle=rgba(lite,0.5); ctx.beginPath(); ctx.arc(px-2,py-2,r*0.42,0,Math.PI*2); ctx.fill();
  }
}
function legPair(ox,baseY,len,swing,c,b,reach,isBack){
  reach=reach||0;
  const lw=Math.max(9,b.len*0.12);
  const col = isBack ? mix(c.shade,-0.05) : c.coat;
  legLine(ox+(isBack?-6:5), baseY-len*0.8, swing*(isBack?0.6:1), len, reach, col, lw);
}
function legLine(x,y,swing,len,reach,col,lw){
  const footX=x+swing*0.5+reach, footY=y+len, midX=x+reach*0.6, midY=y+len*0.5;
  ctx.lineCap="round"; ctx.lineJoin="round";
  ctx.strokeStyle=mix(col,-0.45); ctx.lineWidth=lw+3;                 // outline
  ctx.beginPath(); ctx.moveTo(x,y); ctx.lineTo(midX,midY); ctx.lineTo(footX,footY); ctx.stroke();
  ctx.strokeStyle=col; ctx.lineWidth=lw;                             // fill
  ctx.beginPath(); ctx.moveTo(x,y); ctx.lineTo(midX,midY); ctx.lineTo(footX,footY); ctx.stroke();
  ctx.fillStyle=mix(col,-0.12); ctx.strokeStyle=mix(col,-0.45); ctx.lineWidth=2;  // paw
  ctx.beginPath(); ctx.ellipse(footX,footY,8,5.5,0,0,Math.PI*2); ctx.fill(); ctx.stroke();
}
function drawTail(kind,x,y,c,t,state){
  ctx.save();
  const wag = (state==="win"||state==="idle") ? Math.sin(t*0.25)*14 : Math.sin(t*0.06)*5;
  let lw=12, cx, cyy, ex, ey;
  if(kind==="curl"){ lw=13; cx=x-26; cyy=y-30+wag; ex=x+2;  ey=y-44+wag; }
  else if(kind==="bush"){ lw=20; cx=x-28; cyy=y-6;     ex=x-40; ey=y-26+wag; }
  else if(kind==="med"){ lw=12; cx=x-24; cyy=y-2;     ex=x-34; ey=y-20+wag; }
  else { lw=11; cx=x-20; cyy=y; ex=x-30; ey=y-14+wag; }
  ctx.lineCap="round";
  ctx.strokeStyle=mix(c.coat,-0.45); ctx.lineWidth=lw+3;             // outline
  ctx.beginPath(); ctx.moveTo(x,y); ctx.quadraticCurveTo(cx,cyy,ex,ey); ctx.stroke();
  ctx.strokeStyle=c.coat; ctx.lineWidth=lw;                         // fill
  ctx.beginPath(); ctx.moveTo(x,y); ctx.quadraticCurveTo(cx,cyy,ex,ey); ctx.stroke();
  ctx.fillStyle=rgba(mix(c.coat,0.4),0.7);                          // tip highlight
  ctx.beginPath(); ctx.arc(ex,ey,lw*0.36,0,Math.PI*2); ctx.fill();
  ctx.restore();
}
function drawHead(x,y,c,b,flash,mouthOpen,f){
  ctx.save();
  ctx.translate(x,y);
  const t=f.animT, hr=b.height*0.22, out=mix(c.coat,-0.5), sn=b.snout;
  // ears (behind head)
  drawEars(b.ear,c,b,t,f.state);
  // skull
  ctx.fillStyle= flash?"#fff": vGrad(-hr,b.height*0.20, mix(c.coat,0.2), mix(c.coat,-0.14));
  ctx.beginPath(); ctx.ellipse(0,0,hr, b.height*0.20,0,0,Math.PI*2); ctx.fill();
  if(!flash){ ctx.lineWidth=3; ctx.lineJoin="round"; ctx.strokeStyle=out; ctx.stroke(); }
  // mask marking (clipped to skull)
  if(!flash){
    ctx.save(); ctx.beginPath(); ctx.ellipse(0,0,hr,b.height*0.20,0,0,Math.PI*2); ctx.clip();
    ctx.fillStyle=rgba(c.mask,0.6);
    ctx.beginPath(); ctx.ellipse(b.height*0.03,-b.height*0.02,hr*0.82,b.height*0.16,0,0,Math.PI*2); ctx.fill();
    ctx.restore();
  }
  // snout
  ctx.fillStyle= flash?"#fff": vGrad(0,b.height*0.14, mix(c.coat,0.15), mix(c.coat,-0.1));
  ctx.beginPath(); ctx.ellipse(b.height*0.18, b.height*0.05+mouthOpen*0.3, sn, sn*0.62+mouthOpen*0.4,0,0,Math.PI*2); ctx.fill();
  if(!flash){ ctx.lineWidth=2.5; ctx.strokeStyle=out; ctx.stroke(); }
  // mouth open (aggression / bark)
  if(mouthOpen>1){
    ctx.fillStyle="#5a1418";
    ctx.beginPath(); ctx.ellipse(b.height*0.2, b.height*0.08+mouthOpen*0.4, sn*0.7, mouthOpen*0.5,0,0,Math.PI*2); ctx.fill();
    if(f.state==="win"||f.state==="idle"){               // happy tongue
      ctx.fillStyle="#ff7a8a";
      ctx.beginPath(); ctx.ellipse(b.height*0.24, b.height*0.1+mouthOpen*0.55, sn*0.4, mouthOpen*0.42,0,0,Math.PI*2); ctx.fill();
    }
    if(f.def.stats.aggressiveness>=7){                    // fangs
      ctx.fillStyle="#fff";
      ctx.beginPath(); ctx.moveTo(b.height*0.12,b.height*0.05); ctx.lineTo(b.height*0.14,b.height*0.05+5); ctx.lineTo(b.height*0.16,b.height*0.05); ctx.fill();
      ctx.beginPath(); ctx.moveTo(b.height*0.24,b.height*0.05); ctx.lineTo(b.height*0.26,b.height*0.05+5); ctx.lineTo(b.height*0.28,b.height*0.05); ctx.fill();
    }
  }
  // nose with shine
  ctx.fillStyle=c.nose;
  ctx.beginPath(); ctx.arc(b.height*0.18+sn*0.7, b.height*0.02, 5.5,0,Math.PI*2); ctx.fill();
  ctx.fillStyle="rgba(255,255,255,0.5)";
  ctx.beginPath(); ctx.arc(b.height*0.18+sn*0.7-1.6, b.height*0.02-1.6, 1.7,0,Math.PI*2); ctx.fill();
  // eye (blink occasionally)
  const blink = (f.blinkT%220)<8;
  if(!blink){
    ctx.fillStyle="#fff";
    ctx.beginPath(); ctx.ellipse(b.height*0.06,-b.height*0.045, 6.5,7.5,0,0,Math.PI*2); ctx.fill();
    ctx.lineWidth=1.5; ctx.strokeStyle=rgba(out,0.6); ctx.stroke();
    ctx.fillStyle=c.eye; ctx.beginPath(); ctx.arc(b.height*0.085,-b.height*0.03, 3.6,0,Math.PI*2); ctx.fill();
    ctx.fillStyle="#000"; ctx.beginPath(); ctx.arc(b.height*0.092,-b.height*0.03, 1.8,0,Math.PI*2); ctx.fill();
    ctx.fillStyle="#fff"; ctx.beginPath(); ctx.arc(b.height*0.07,-b.height*0.052, 1.4,0,Math.PI*2); ctx.fill();
  } else {
    ctx.strokeStyle=out; ctx.lineWidth=2.5; ctx.lineCap="round";
    ctx.beginPath(); ctx.moveTo(b.height*0.02,-b.height*0.03); ctx.lineTo(b.height*0.12,-b.height*0.03); ctx.stroke();
  }
  // angry brow for aggressive dogs
  if(f.def.stats.aggressiveness>=8){
    ctx.strokeStyle=out; ctx.lineWidth=3.5; ctx.lineCap="round";
    ctx.beginPath(); ctx.moveTo(-b.height*0.01,-b.height*0.13); ctx.lineTo(b.height*0.15,-b.height*0.055); ctx.stroke();
  }
  ctx.restore();
}
function drawEars(kind,c,b,t,state){
  const flick = Math.sin(t*0.1)*3;
  if(kind==="prick"){
    ear(-b.height*0.08,-b.height*0.18, -b.height*0.02,-b.height*0.42+flick, b.height*0.14, c);
    ear(b.height*0.06,-b.height*0.18, b.height*0.12,-b.height*0.40, b.height*0.14, c);
  } else if(kind==="bat"){ // big chihuahua ears
    ear(-b.height*0.10,-b.height*0.14, -b.height*0.22,-b.height*0.46+flick, b.height*0.2, c);
    ear(b.height*0.08,-b.height*0.14, b.height*0.2,-b.height*0.44, b.height*0.2, c);
  } else if(kind==="floppy"){
    floppyEar(-b.height*0.16,-b.height*0.02, b.height*0.10,b.height*0.2, 0.4, c);
    floppyEar(b.height*0.16,0, b.height*0.10,b.height*0.2, -0.4, c);
  } else {
    ear(-b.height*0.08,-b.height*0.16, -b.height*0.06,-b.height*0.36+flick, b.height*0.13, c);
    ear(b.height*0.06,-b.height*0.16, b.height*0.10,-b.height*0.34, b.height*0.13, c);
  }
}
function ear(x1,y1,tx,ty,wd,c){
  ctx.beginPath();
  ctx.moveTo(x1-wd/2,y1); ctx.lineTo(tx,ty); ctx.lineTo(x1+wd/2,y1); ctx.closePath();
  ctx.fillStyle=c.ear; ctx.fill();
  ctx.lineJoin="round"; ctx.lineWidth=2.5; ctx.strokeStyle=mix(c.coat,-0.5); ctx.stroke();
  ctx.beginPath();                                        // inner ear
  ctx.moveTo(x1-wd*0.25,y1-2); ctx.lineTo((tx+x1)/2,(ty+y1)/2); ctx.lineTo(x1+wd*0.25,y1-2); ctx.closePath();
  ctx.fillStyle="rgba(60,38,48,0.55)"; ctx.fill();
}
function floppyEar(cx,cy,rx,ry,rot,c){
  ctx.save(); ctx.translate(cx,cy); ctx.rotate(rot);
  ctx.beginPath(); ctx.ellipse(0,0,rx,ry,0,0,Math.PI*2);
  ctx.fillStyle=c.ear; ctx.fill(); ctx.lineWidth=2.5; ctx.lineJoin="round"; ctx.strokeStyle=mix(c.coat,-0.5); ctx.stroke();
  ctx.fillStyle=rgba(mix(c.coat,0.2),0.5);
  ctx.beginPath(); ctx.ellipse(-rx*0.2,-ry*0.2,rx*0.5,ry*0.5,0,0,Math.PI*2); ctx.fill();
  ctx.restore();
}

function drawHealthBar(f, x, y, right){
  const bw=360, bh=20, bx=right?x-bw:x;
  ctx.fillStyle="rgba(0,0,0,0.55)"; roundRect(bx-3,y-3,bw+6,bh+6,5); ctx.fill();
  ctx.fillStyle="#2a0d0d"; roundRect(bx,y,bw,bh,4); ctx.fill();
  ctx.save(); roundRect(bx,y,bw,bh,4); ctx.clip();
  // chip "ghost" health (drains slowly)
  const gr=clamp(f.hpGhost/f.maxHp,0,1), gw=bw*gr;
  ctx.fillStyle="#ff8a3c"; ctx.fillRect(right?bx+bw-gw:bx, y, gw, bh);
  // real health (gradient + gloss)
  const ratio=clamp(f.hp/f.maxHp,0,1), hw=bw*ratio;
  const c1 = ratio>0.5?"#5be07a":ratio>0.22?"#ffd24a":"#ff5a4a";
  const c2 = ratio>0.5?"#2fa653":ratio>0.22?"#d89a20":"#c22222";
  ctx.fillStyle=vGrad(y,y+bh,c1,c2); ctx.fillRect(right?bx+bw-hw:bx, y, hw, bh);
  ctx.fillStyle="rgba(255,255,255,0.22)"; ctx.fillRect(right?bx+bw-hw:bx, y, hw, bh*0.42);
  ctx.restore();
  // ticks + frame
  ctx.strokeStyle="rgba(0,0,0,0.3)"; ctx.lineWidth=1;
  for(let i=1;i<4;i++){ const tx=bx+bw*i/4; ctx.beginPath(); ctx.moveTo(tx,y); ctx.lineTo(tx,y+bh); ctx.stroke(); }
  ctx.strokeStyle="rgba(255,255,255,0.5)"; ctx.lineWidth=2; roundRect(bx,y,bw,bh,4); ctx.stroke();
}
function drawMeter(f,x,y,right){
  const bw=360, bh=7, bx=right?x-bw:x;
  ctx.fillStyle="rgba(0,0,0,0.55)"; ctx.fillRect(bx,y,bw,bh);
  const w=bw*(f.meter/100), ready=f.meter>=50;
  ctx.fillStyle = ready? "#4ad0ff":"#2a6a8a";
  ctx.fillRect(right?bx+bw-w:bx, y, w, bh);
  if(ready){
    ctx.save(); ctx.shadowColor="#4ad0ff"; ctx.shadowBlur=8;
    ctx.fillStyle=rgba("#4ad0ff",0.6); ctx.fillRect(right?bx+bw-w:bx,y,w,bh); ctx.restore();
    if((game.t%44)<26){ ctx.fillStyle="#bfeeff"; ctx.font="bold 9px Trebuchet MS";
      ctx.textAlign=right?"right":"left"; ctx.textBaseline="bottom";
      ctx.fillText("SPECIAL READY", right?bx+bw:bx, y-1); }
  }
  if(f.s.rage){
    ctx.fillStyle="rgba(40,8,5,0.7)"; ctx.fillRect(bx,y+9,bw,4);
    const rw=bw*(f.rage/100); ctx.fillStyle="#ff3b1f"; ctx.fillRect(right?bx+bw-rw:bx,y+9,rw,4);
  }
}
function drawRoundPips(p, x, y){
  const right = p===1;
  for(let i=0;i<2;i++){
    const px = right ? x-i*22 : x+i*22, won=i<game.roundWins[p];
    ctx.beginPath(); ctx.arc(px,y,7,0,Math.PI*2);
    if(won){ ctx.save(); ctx.shadowColor="#ffcf4a"; ctx.shadowBlur=9; ctx.fillStyle="#ffcf4a"; ctx.fill(); ctx.restore(); }
    else { ctx.fillStyle="#3a3a44"; ctx.fill(); }
    ctx.strokeStyle="rgba(0,0,0,0.7)"; ctx.lineWidth=2; ctx.stroke();
  }
}
function drawFinishTimer(){
  ctx.save(); ctx.textAlign="center"; ctx.textBaseline="middle"; ctx.font="bold 24px Trebuchet MS";
  ctx.shadowColor="#ff3b3b"; ctx.shadowBlur=14; ctx.fillStyle="#ff6a5a";

/* ---------- banners ---------- */
function drawBanner(bn){
  const t=bn.t;
  let scale = 1;
  if(bn.phase==="round"||bn.phase==="fight"||bn.phase==="ko"||bn.phase==="match"){
    scale = t<10 ? t/10*1.25 : 1.25 - Math.min(0.25,(t-10)/30*0.25);
  }
  if(bn.phase==="finish"){ scale=1.15+Math.sin(t*0.2)*0.08; }
  ctx.save();
  ctx.translate(W/2, H*0.34);
  ctx.scale(scale,scale);
  ctx.textAlign="center"; ctx.textBaseline="middle";
  ctx.font="900 66px Trebuchet MS";
  ctx.shadowColor=rgba(bn.color,0.85); ctx.shadowBlur=24;
  ctx.lineWidth=9; ctx.lineJoin="round"; ctx.strokeStyle="#000"; ctx.strokeText(bn.text,0,0);
  ctx.fillStyle=vGrad(-34,34, mix(bn.color,0.45), bn.color); ctx.fillText(bn.text,0,0);
  ctx.shadowBlur=0;
  if(bn.sub){
    ctx.font="bold 26px Trebuchet MS";
    ctx.lineWidth=5; ctx.strokeStyle="#000"; ctx.strokeText(bn.sub,0,52);
    ctx.fillStyle="#fff"; ctx.fillText(bn.sub,0,52);
  }
  ctx.restore();
}

/* ---------- title ---------- */
function drawTitle(){
  const g=ctx.createLinearGradient(0,0,0,H);
  g.addColorStop(0,"#180a12"); g.addColorStop(0.6,"#2a0f1c"); g.addColorStop(1,"#431126");
  ctx.fillStyle=g; ctx.fillRect(0,0,W,H);
  // warm spotlight
  const rg=ctx.createRadialGradient(W/2,200,40,W/2,250,540);
  rg.addColorStop(0,"rgba(255,120,80,0.18)"); rg.addColorStop(1,"rgba(255,120,80,0)");
  ctx.fillStyle=rg; ctx.fillRect(0,0,W,H);
  // claw scratches
  ctx.strokeStyle="rgba(255,80,60,0.10)"; ctx.lineWidth=3;
  for(let i=0;i<8;i++){ ctx.beginPath(); ctx.moveTo((i*140)%W,0); ctx.lineTo((i*140)%W-120,H); ctx.stroke(); }
  // drifting embers
  ctx.save(); ctx.globalCompositeOperation="lighter";
  for(let i=0;i<26;i++){
    const ex=(i*97 + game.t*0.6*(1+i%3))%W;
    const ey=(H - ((game.t*0.7+i*60)%(H+40)));
    ctx.globalAlpha=0.2+0.2*Math.sin(game.t*0.05+i);
    ctx.fillStyle="#ff9a5a"; ctx.beginPath(); ctx.arc(ex,ey,1.6+(i%3),0,Math.PI*2); ctx.fill();
  }
  ctx.restore(); ctx.globalAlpha=1;

  // logo
  ctx.textAlign="center"; ctx.textBaseline="middle";
  const pulse=1+Math.sin(game.t*0.05)*0.02;
  ctx.save(); ctx.translate(W/2,176); ctx.scale(pulse,pulse);
  ctx.font="900 94px Trebuchet MS";
  ctx.shadowColor="rgba(255,160,60,0.7)"; ctx.shadowBlur=30;
  ctx.lineWidth=13; ctx.lineJoin="round"; ctx.strokeStyle="#000"; ctx.strokeText("PAWS OF FURY",0,0);
  ctx.fillStyle=vGrad(-46,46,"#ffe08a","#ff9a2a"); ctx.fillText("PAWS OF FURY",0,0);
  ctx.restore();

  ctx.font="bold 22px Trebuchet MS"; ctx.fillStyle="#ffd9b0";
  ctx.fillText("a Mortal-Kombat-style dog brawl", W/2, 248);

  // dog lineup on a shadow line
  const ids=FIGHTERS, gy=386;
  for(let i=0;i<ids.length;i++){
    const fx=W/2 + (i-(ids.length-1)/2)*132;
    ctx.fillStyle="rgba(0,0,0,0.35)"; ctx.beginPath(); ctx.ellipse(fx,gy+8,46,9,0,0,Math.PI*2); ctx.fill();
    drawMiniDog(ids[i], fx, gy, 0.92, game.t*0.02+i);
  }

  // start buttons
  const blink=(game.t%60)<42;
  ctx.font="bold 23px Trebuchet MS";
  drawTitleBtn(W/2-148, 448, "[1]  1 PLAYER", blink);
  drawTitleBtn(W/2+148, 448, "[2]  2 PLAYER", blink);
  ctx.font="13px Trebuchet MS"; ctx.fillStyle="#c8a89a";
  ctx.textAlign="center"; ctx.fillText("press 1 or 2 to begin", W/2, 492);
}
function drawTitleBtn(cx,y,txt,on){
  ctx.save(); ctx.textAlign="center"; ctx.textBaseline="middle";
  const w=214,h=40;
  ctx.fillStyle=on?"rgba(255,160,60,0.16)":"rgba(255,160,60,0.06)";
  roundRect(cx-w/2,y-h/2,w,h,9); ctx.fill();
  ctx.strokeStyle=on?"#ffcf4a":"#7a5a2a"; ctx.lineWidth=2; roundRect(cx-w/2,y-h/2,w,h,9); ctx.stroke();
  ctx.fillStyle=on?"#ffe2a0":"#9a7a4a"; ctx.fillText(txt,cx,y+1);
  ctx.restore();
}
function drawMiniDog(def,x,y,scale,t){
  ctx.save(); ctx.translate(x,y); ctx.scale(scale,scale);
  const f={def,animT:t*20,blinkT:50,walkPhase:0,state:"idle",facing:1,
           crouch:false,curHeight:()=>def.body.height,top:0,s:deriveStats(def.stats),rage:0,
           move:null,flashHurt:0,koSpin:0};
  const c=def.colors,b=def.body;
  const bx=-b.len*0.5, by=-b.height*0.5, bw=b.len, bh=b.height*0.5;
  drawTail(b.tail, bx+2, by+bh*0.5, c, f.animT, "idle");
  if(b.fluff>0.4) drawFluff(bx,by,bw,bh,c.coat,f.animT);
  roundedBelly(bx,by,bw,bh,c,b,false);
  drawHead(b.len*0.34,-b.height*0.55,c,b,false,Math.abs(Math.sin(t))*4,f);
  ctx.restore();
}

/* ---------- select ---------- */
function drawSelect(){
  const g=ctx.createLinearGradient(0,0,0,H);
  g.addColorStop(0,"#11111a"); g.addColorStop(1,"#1c1626");
  ctx.fillStyle=g; ctx.fillRect(0,0,W,H);
  ctx.fillStyle="rgba(0,0,0,0.4)"; ctx.fillRect(0,0,W,70);
  ctx.textAlign="center"; ctx.textBaseline="middle"; ctx.font="900 40px Trebuchet MS";
  ctx.shadowColor="rgba(255,160,60,0.55)"; ctx.shadowBlur=18;
  ctx.fillStyle="#ffcf4a"; ctx.fillText("CHOOSE YOUR FIGHTER", W/2, 36);
  ctx.shadowBlur=0;

  const n=FIGHTERS.length, cardW=150, gap=18;
  const totalW=n*cardW+(n-1)*gap, startX=(W-totalW)/2;
  for(let i=0;i<n;i++) drawSelectCard(FIGHTERS[i], startX+i*(cardW+gap), 100, cardW, 180, i);

  drawSelectDetail(0, 40, 300);
  if(game.mode==="2p") drawSelectDetail(1, W-40-300, 300);
  else {
    ctx.textAlign="right"; ctx.textBaseline="alphabetic"; ctx.fillStyle="#888"; ctx.font="16px Trebuchet MS";
    ctx.fillText("CPU picks a random rival", W-40, 320);
  }

  ctx.textAlign="center"; ctx.fillStyle="#998c80"; ctx.font="14px Trebuchet MS";
  ctx.fillText(game.mode==="2p"
    ? "P1 A/D + F to lock · P2 ◀▶ + , to lock · G unlock · Esc back"
    : "A/D move · F lock in · G unlock · Esc back", W/2, H-24);
}
function drawSelectCard(def,x,y,w,h,i){

function selBorder(x,y,w,h,col,locked,label,right){

function tag(x,y,txt,col){

const STAT_KEYS=["strength","speed","agility","cleverness","aggressiveness"];
const STAT_LABELS={strength:"STRENGTH",speed:"SPEED",agility:"AGILITY",cleverness:"CLEVERNESS",aggressiveness:"AGGRESSION"};
function drawSelectDetail(p, x, y){
  const def=FIGHTERS[game.selectIndex[p]];
  const col = p===0?"#4ad0ff":"#ff7a3b";
  ctx.textAlign="left"; ctx.textBaseline="top";
  ctx.fillStyle=col; ctx.font="bold 14px Trebuchet MS";
  ctx.fillText(p===0?"PLAYER 1":"PLAYER 2", x, y-26);
  ctx.fillStyle="#fff"; ctx.font="900 30px Trebuchet MS";
  ctx.fillText(def.name, x, y);
  ctx.fillStyle="#bbb"; ctx.font="italic 14px Trebuchet MS";
  ctx.fillText(def.breed, x, y+34);
  // stat bars
  let yy=y+62;
  for(const k of STAT_KEYS){
    const v=def.stats[k];
    ctx.fillStyle="#ccc"; ctx.font="bold 12px Trebuchet MS"; ctx.textAlign="left";
    ctx.fillText(STAT_LABELS[k], x, yy);
    const bx=x+108, bw=170, bh=12;
    ctx.fillStyle="rgba(0,0,0,0.5)"; roundRect(bx,yy-1,bw,bh,3); ctx.fill();
    const fillc = v>=10?"#ff3b1f":v>=8?"#ffcf4a":col;
    ctx.save(); roundRect(bx,yy-1,bw,bh,3); ctx.clip();
    ctx.fillStyle=vGrad(yy-1,yy-1+bh, mix(fillc,0.3), fillc); ctx.fillRect(bx,yy-1,bw*(v/10),bh);
    ctx.fillStyle="rgba(255,255,255,0.2)"; ctx.fillRect(bx,yy-1,bw*(v/10),bh*0.4);
    ctx.restore();
    // segment ticks
    ctx.strokeStyle="rgba(0,0,0,0.35)"; ctx.lineWidth=1;
    for(let s=1;s<10;s++){ const sx=bx+bw*s/10; ctx.beginPath(); ctx.moveTo(sx,yy-1); ctx.lineTo(sx,yy-1+bh); ctx.stroke(); }
    if(v>=10){ ctx.fillStyle="#ff3b1f"; ctx.font="bold 11px Trebuchet MS"; ctx.textBaseline="top";
      ctx.fillText("MAX!", bx+bw+6, yy); }
    yy+=24;
  }
  // special + blurb
  ctx.fillStyle="#ffcf4a"; ctx.font="bold 13px Trebuchet MS";
  ctx.fillText("SPECIAL: "+def.special.name, x, yy+4);
  ctx.fillStyle="#999"; ctx.font="13px Trebuchet MS";
  wrapText(def.blurb, x, yy+26, 300, 17);
}
function wrapText(text,x,y,maxW,lh){
  const words=text.split(" "); let line="", yy=y;
  for(const w of words){
    if(ctx.measureText(line+w+" ").width>maxW){ ctx.fillText(line,x,yy); line=w+" "; yy+=lh; }
    else line+=w+" ";
  }
  ctx.fillText(line,x,yy);
}

/* ---------- mute icon ---------- */
function drawMuteIcon(){
  const x=W-30,y=H-26;
  ctx.fillStyle="rgba(0,0,0,0.4)"; ctx.beginPath(); ctx.arc(x,y,14,0,Math.PI*2); ctx.fill();
  ctx.strokeStyle="#fff"; ctx.lineWidth=2; ctx.fillStyle="#fff";
  ctx.beginPath(); ctx.moveTo(x-6,y-3); ctx.lineTo(x-2,y-3); ctx.lineTo(x+2,y-7);
  ctx.lineTo(x+2,y+7); ctx.lineTo(x-2,y+3); ctx.lineTo(x-6,y+3); ctx.closePath(); ctx.fill();
  if(Audio.isMuted()){ ctx.strokeStyle="#ff3b3b"; ctx.lineWidth=2.5;
    ctx.beginPath(); ctx.moveTo(x-9,y-9); ctx.lineTo(x+9,y+9); ctx.stroke(); }
  else { ctx.beginPath(); ctx.arc(x+4,y,6,-0.6,0.6); ctx.stroke(); }
}

/* ============================================== mobile touch controls ==== */
function setupTouch(){
  const isTouch = window.matchMedia("(pointer: coarse)").matches
    || ("ontouchstart" in window) || navigator.maxTouchPoints>0
    || location.search.includes("touch");
  if(isTouch) document.body.classList.add("touch");

  const press = k => { if(k==="block"){ touchBlock=true; return; }
    if(!keys[k]) pressed[k]=true; keys[k]=true; Audio.ensure(); };
  const release = k => { if(k==="block"){ touchBlock=false; return; } keys[k]=false; };

  document.querySelectorAll(".ctl").forEach(el=>{
    const k = el.dataset.k;
    const on  = e => { e.preventDefault(); el.classList.add("on"); press(k); };
    const off = e => { if(e) e.preventDefault(); el.classList.remove("on"); release(k); };
    el.addEventListener("pointerdown", on);
    el.addEventListener("pointerup", off);
    el.addEventListener("pointercancel", off);
    el.addEventListener("pointerleave", off);
    el.addEventListener("contextmenu", e=>e.preventDefault());
  });

  // tap the play area to start / advance menus (so a first tap "just works")
  cv.addEventListener("pointerdown", ()=>{
    Audio.ensure();
    if(game.state===STATE.TITLE){ if(!keys["1"]) pressed["1"]=true; }
    else if(game.state===STATE.MATCH_END){ if(!keys[" "]) pressed[" "]=true; }
  });

  // dismiss the rotate hint if the player insists on portrait
  const rot=document.getElementById("rotate-hint");
  if(rot) rot.addEventListener("pointerdown", ()=>document.body.classList.add("norotate"));

  // safety: never leave a button stuck held if focus/visibility is lost
  const releaseAll = ()=>{ ["w","a","s","d","f","g","h"].forEach(k=>keys[k]=false);
    touchBlock=false; document.querySelectorAll(".ctl.on").forEach(e=>e.classList.remove("on")); };
  window.addEventListener("blur", releaseAll);
  document.addEventListener("visibilitychange", ()=>{ if(document.hidden) releaseAll(); });
}
setupTouch();

/* ================================================================ LOOP ==== */
let acc=0, last=performance.now();
const STEP=1000/60;
function loop(now){
  acc += Math.min(100, now-last); last=now;
  while(acc>=STEP){ tick(); acc-=STEP; }
  render();
  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);
</script>
